<div class="viewer-container" *ngIf="evals.length > 0">
  <div class="viewer-header">
    <h1>Evaluaciones</h1>
    <button (click)="goToUploader()" class="upload-evals-button">
      <mat-icon>add</mat-icon>
      Subir Nueva Evaluación
    </button>
  </div>

  <div class="evals-container">
    <div class="eval-item" *ngFor="let eval of evals" [attr.data-status]="eval.status">
      <h2 class="eval-item-title">{{ eval.school_name }}</h2>

      <div class="eval-item-footer">
        <p>Status: {{ eval.status }}</p>    
        <p>Eval Date: {{ eval.createdAt | date : "shortDate" }}</p>

        <p>Numero de Examenes Procesados Satisfactoriamente: {{ eval.number_of_successes }}</p>
        <p>Numero de Examenes Procesados con Error: {{ eval.number_of_failures }}</p>

        <button 
        mat-raised-button
        color="primary">
          <mat-icon>file_download</mat-icon>
          Descargar Resultados
        </button>  
    
      </div>
    </div>
  </div>
</div>

<div class="viewer-container-empty" *ngIf="evals.length == 0">
  <img src="assets/undraw/empty.png" alt="No evals found" />
  <button (click)="goToUploader()" class="upload-evals-button">
    <mat-icon>add</mat-icon>
    Upload New Evals
  </button>
</div>
