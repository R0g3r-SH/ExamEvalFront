<div class="main-container">
  <form class="form-container">
    <h2>New Eval</h2>

    <!-- Nombre de la evaluación -->
    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Nombre de la escuela</mat-label>
      <input matInput [(ngModel)]="evalName" name="evalName" required />
    </mat-form-field>

    <!-- Grado -->
    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Seleccionar grado</mat-label>
      <mat-select [(ngModel)]="selectedGrade" name="evalType" required>
        <mat-option *ngFor="let grade of grades" [value]="grade._id">
          {{ grade.title }}
        </mat-option>
      </mat-select>
    </mat-form-field>

    <!-- Drag & Drop -->
    <div
      class="drop-zone"
      (drop)="onDrop($event)"
      (dragover)="onDragOver($event)"
      (dragleave)="onDragLeave($event)"
      [class.active]="isDragOver"
    >
      <p>Arrastra y suelta imágenes aquí o haz clic para seleccionar</p>
      <input
        type="file"
        hidden
        #fileInput
        (change)="onFileSelected($event)"
        multiple
      />
      <button mat-stroked-button (click)="fileInput.click()" type="button">
        Seleccionar imágenes
      </button>
    </div>

    <!-- Vista previa -->
    <div class="preview-container" *ngIf="selectedFiles.length > 0">
      <div
        class="preview-image"
        *ngFor="let file of selectedFiles; let i = index"
      >
        <img [src]="file.preview" />
        <button mat-icon-button color="warn" (click)="removeFile(i)">
          <mat-icon>close</mat-icon>
        </button>
      </div>
    </div>

    <!-- Botón de subir -->
    <button
      mat-raised-button
      (click)="createEvalAndUpload()"
      [disabled]="isUploading || !selectedFiles.length"
    >
      Subir Evaluación ({{ selectedFiles.length }} imágenes)
    </button>

    <!-- Barra de progreso -->
    <mat-progress-bar
      *ngIf="isUploading"
      mode="determinate"
      [value]="uploadProgress"
    ></mat-progress-bar>
  </form>
</div>
